#  flutter_map: ^7.0.0
#  latlong2: ^0.9.1

dependency_overrides:
  http: ^1.2.0
  google_api_headers: ^5.1.0
# This is top-level, same indentation as 'dependencies'
flutter:
  uses-material-design: true
  assets:
    - packages/flutter_google_places_hoc081098/assets/google_white.png
    - packages/flutter_google_places_hoc081098/assets/google_black.png
    - .env
    - images/1.jpeg
    - images/car.png
    - images/3.png
    - images/2.png


